<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOC Report Lexicon</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Bilingual SOC reporting lexicon app with offline exam, writing practice, and spaced repetition." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg:#0b1220; --panel:#111a2b; --panel2:#172338; --text:#e5edf8; --muted:#a9b7cc;
      --accent:#60a5fa; --accent2:#34d399; --danger:#fb7185; --border:#243149; --card:#0f172a;
      --shadow:0 12px 30px rgba(0,0,0,.24);
    }
    body.light {
      --bg:#f3f7fc; --panel:#ffffff; --panel2:#edf3fb; --text:#0f172a; --muted:#475569;
      --accent:#2563eb; --accent2:#059669; --danger:#e11d48; --border:#d8e1ef; --card:#ffffff;
      --shadow:0 10px 24px rgba(2,6,23,.08);
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:linear-gradient(180deg,var(--bg),#09111d 35%,var(--bg)); color:var(--text); }
    body.light { background:linear-gradient(180deg,#f8fbff,#eef4fb 40%,#f5f9ff); }
    .app { max-width:1100px; margin:0 auto; padding:16px; }
    .hero, .panel, .card { background:var(--panel); border:1px solid var(--border); border-radius:20px; box-shadow:var(--shadow); }
    .hero { padding:20px; position:sticky; top:0; z-index:5; backdrop-filter: blur(8px); }
    .hero h1 { margin:0 0 6px; font-size:1.6rem; }
    .muted { color:var(--muted); }
    .controls { display:grid; grid-template-columns:1.3fr 1fr 1fr auto auto auto; gap:10px; margin-top:14px; }
    input, select, textarea, button { width:100%; border-radius:14px; border:1px solid var(--border); padding:12px 14px; font-size:1rem; background:var(--panel2); color:var(--text); }
    button { cursor:pointer; font-weight:700; }
    button.primary { background:linear-gradient(135deg,var(--accent),#8b5cf6); color:white; border:none; }
    button.secondary { background:linear-gradient(135deg,var(--accent2),#10b981); color:white; border:none; }
    button.ghost { background:transparent; }
    .tabs { display:grid; grid-template-columns:repeat(8,1fr); gap:8px; margin:14px 0 18px; }
    .tab.active { outline:2px solid var(--accent); }
    .grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
    .list { padding:14px; }
    .phrase { padding:14px; border:1px solid var(--border); border-radius:16px; margin-bottom:10px; background:var(--card); }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .badge { font-size:.8rem; padding:5px 10px; border-radius:999px; background:var(--panel2); border:1px solid var(--border); color:var(--muted); }
    .actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .side { display:grid; gap:16px; }
    .panel { padding:16px; }
    .card { padding:18px; }
    .flash { min-height:220px; display:grid; align-content:center; text-align:center; }
    .flash .big { font-size:1.35rem; font-weight:700; }
    .center { text-align:center; }
    .stats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .stat { padding:14px; border-radius:16px; background:var(--panel2); border:1px solid var(--border); }
    .progressbar { height:10px; border-radius:999px; background:var(--panel2); overflow:hidden; }
    .progressbar > div { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
    .small { font-size:.9rem; }
    .question { font-size:1.1rem; font-weight:700; margin-bottom:14px; }
    .options { display:grid; gap:10px; }
    .historyItem { display:flex; justify-content:space-between; border-bottom:1px solid var(--border); padding:10px 0; }
    canvas { max-width:100%; border-radius:18px; border:1px solid var(--border); background:white; }
    .hidden { display:none; }
    @media (max-width: 860px) {
      .controls { grid-template-columns:1fr 1fr; }
      .tabs { grid-template-columns:repeat(2,1fr); }
      .grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="row" style="justify-content:space-between;">
        <div>
          <h1 id="appTitle"></h1>
          <div class="muted" id="tagline"></div>
        </div>
        <div class="row">
          <button id="themeBtn" class="ghost">🌓</button>
          <select id="langSelect" style="width:auto;">
            <option value="en">English</option>
            <option value="fr">Français</option>
          </select>
        </div>
      </div>
      <div class="controls">
        <input id="searchInput" />
        <select id="categorySelect"></select>
        <select id="modeFilter">
          <option value="all">All</option>
          <option value="new">New</option>
          <option value="weak">Weak</option>
          <option value="mastered">Mastered</option>
        </select>
        <button id="dailyBtn" class="secondary"></button>
        <button id="speakBtn"></button>
        <button id="installBtn" class="primary hidden"></button>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="browse"></button>

        <button class="tab" data-tab="quiz"></button>
        <button class="tab" data-tab="exam"></button>
        <button class="tab" data-tab="writing"></button>
        <button class="tab" data-tab="review"></button>
        <button class="tab" data-tab="notes"></button>
        <button class="tab" data-tab="stats"></button>
      </div>
    </section>

    <section class="grid">
      <div id="mainPanel" class="panel"></div>
      <aside class="side">
        <div class="panel">
          <div class="row" style="justify-content:space-between;">
            <strong id="scoreHistoryLabel"></strong>
            <button id="resetProgressBtn" class="ghost small"></button>
          </div>
          <div id="historyList" class="small"></div>
        </div>
        <div class="panel">
          <div class="stats">
            <div class="stat"><div class="muted small" id="studiedLabel"></div><div id="studiedCount" class="bigNum">0</div></div>
            <div class="stat"><div class="muted small" id="masteredLabel"></div><div id="masteredCount" class="bigNum">0</div></div>
            <div class="stat"><div class="muted small" id="weakCountLabel"></div><div id="weakCount" class="bigNum">0</div></div>
            <div class="stat"><div class="muted small">Daily</div><div id="dailyCount" class="bigNum">0/10</div></div>
          </div>
        </div>
        <div class="panel">
          <div class="muted small" id="footerText"></div>
        </div>
      </aside>
    </section>
  </div>

      <p>${t('weakIntro')}</p>
      <div class="actions"><button class="primary" onclick="startQuiz(true)">${state.lang==='fr' ? 'Quiz des phrases faibles' : 'Weak phrase quiz'}</button></div>
      ${weak.slice(0,25).map(p => `<div class="phrase"><div style="font-weight:700;">${phraseText(p)}</div><div class="muted">${pairedText(p)}</div></div>`).join('')}
    </div>`;
  }
  function renderNotes() {
    const main = document.getElementById('mainPanel');
    main.innerHTML = `<div class="card">
      <strong>${t('notes')}</strong>
      <textarea id="notesBox" rows="14" placeholder="${t('notesPlaceholder')}">${state.notes || ''}</textarea>
      <div class="actions">
        <button onclick="saveNotes()">${t('saveNotes')}</button>
        <button onclick="exportNotes()">${t('exportNotes')}</button>
      </div>
    </div>`;
  }
  function saveNotes() { state.notes = document.getElementById('notesBox').value; saveState(); }
  function exportNotes() {
    saveNotes();
    const blob = new Blob([state.notes], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'soc-notes.txt';
    a.click();
  }
  function renderStats() {
    const studied = PHRASES.filter(p=>ensureProgress(p.id).seen>0).length;
    const mastered = PHRASES.filter(p=>ensureProgress(p.id).mastered).length;
    const weak = PHRASES.filter(p=>(ensureProgress(p.id).hard + ensureProgress(p.id).wrong) > 0 && !ensureProgress(p.id).mastered).length;
    const main = document.getElementById('mainPanel');
    main.innerHTML = `<div class="card">
      <h2>${t('stats')}</h2>
      <p>${t('studied')}: <strong>${studied}</strong> / ${PHRASES.length}</p>
      <div class="progressbar"><div style="width:${(studied/PHRASES.length)*100}%"></div></div>
      <p>${t('mastered')}: <strong>${mastered}</strong> / ${PHRASES.length}</p>
      <div class="progressbar"><div style="width:${(mastered/PHRASES.length)*100}%"></div></div>
      <p>${t('weakCount')}: <strong>${weak}</strong></p>
      <p>${t('dailyDone')}: <strong>${completedDailyCount()} / 10</strong></p>
    </div>`;
  }
  function render() {
    document.body.className = state.theme === 'light' ? 'light' : '';
    document.getElementById('langSelect').value = state.lang;
    updateTopText(); populateFilters(); renderHistory(); refreshCounters();
    if (currentTab === 'browse') renderBrowse();
    if (currentTab === 'flashcards') renderFlashcards();
    if (currentTab === 'quiz') renderQuiz();
    if (currentTab === 'exam') renderExam();
    if (currentTab === 'writing') renderWriting();
    if (currentTab === 'review') renderReview();
    if (currentTab === 'notes') renderNotes();
    if (currentTab === 'stats') renderStats();
  }
  function activateTab() {
    document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab===currentTab));
    render();
  }

  document.getElementById('langSelect').addEventListener('change', e => { state.lang = e.target.value; saveState(); render(); });
  document.getElementById('themeBtn').addEventListener('click', () => { state.theme = state.theme === 'light' ? 'dark' : 'light'; saveState(); render(); });
  document.getElementById('searchInput').addEventListener('input', () => renderBrowse());
  document.getElementById('categorySelect').addEventListener('change', () => renderBrowse());
  document.getElementById('modeFilter').addEventListener('change', () => renderBrowse());
  document.getElementById('dailyBtn').addEventListener('click', openDaily);
  document.getElementById('speakBtn').addEventListener('click', () => { state.speech = !state.speech; saveState(); render(); });
  document.getElementById('resetProgressBtn').addEventListener('click', () => {
    if (!confirm(state.lang==='fr' ? 'Réinitialiser tout le progrès ?' : 'Reset all progress?')) return;
    state.progress = {}; state.history = []; state.dailyDoneIds=[]; saveState(); render();
  });
  document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => { currentTab = btn.dataset.tab; if (currentTab==='quiz' && !quizSet.length) startQuiz(false); else activateTab(); }));
  window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').classList.remove('hidden'); });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBtn').classList.add('hidden');
  });
  if ('serviceWorker' in navigator) window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js'));
  buildDailySet();
  render();
  window.studyPhrase = studyPhrase;
  window.toggleMastered = toggleMastered;
  window.markHard = markHard;
  window.toggleAnswer = toggleAnswer;
  window.prevFlash = prevFlash;
  window.nextFlash = nextFlash;
  window.markEasyCurrent = markEasyCurrent;
  window.answerQuiz = answerQuiz;
  window.startQuiz = startQuiz;
  window.startExam = startExam;
  window.answerExam = answerExam;
  window.downloadCertificate = downloadCertificate;
  window.newWritingSet = newWritingSet;
  window.scoreWriting = scoreWriting;
  window.saveNotes = saveNotes;
  window.exportNotes = exportNotes;
  </script>
</body>
</html>
